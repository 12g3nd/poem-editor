<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Poem Editor</title>
    <script type="text/javascript">
      // Single Page Apps for GitHub Pages: https://github.com/rafgraph/spa-github-pages
      // GitHub Pages has no server-side rewrites, so a direct link or
      // refresh on a client-routed path (e.g. /poem-editor/poem/abc123)
      // 404s here. This encodes that path into a query string and bounces
      // back to index.html, which decodes it before React Router mounts.
      // pathSegmentsToKeep = 1 to preserve the /poem-editor/ prefix.
      var pathSegmentsToKeep = 1
      var l = window.location
      l.replace(
        l.protocol +
          '//' +
          l.hostname +
          (l.port ? ':' + l.port : '') +
          l.pathname
            .split('/')
            .slice(0, 1 + pathSegmentsToKeep)
            .join('/') +
          '/?/' +
          l.pathname
            .slice(1)
            .split('/')
            .slice(pathSegmentsToKeep)
            .join('/')
            .replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash,
      )
    </script>
  </head>
  <body></body>
</html>
